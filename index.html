<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustClover</title>
  <meta name="theme-color" content="#080912" />
  <script>
    window.JUSTCLOVER_BUILD = "stage66-native-player-shell-20260502-1";
  </script>
  <style>
    html,body{margin:0;min-height:100%;background:#06070d;color:#f5f7ff;font-family:Inter,Segoe UI,Arial,sans-serif}
    .jc40-loader{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,#1a1230,transparent 42%),#06070d}
    .jc40-loader-card{max-width:560px;padding:26px 28px;border-radius:24px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.12);box-shadow:0 28px 80px rgba(0,0,0,.42)}
    .jc40-loader-card b{font-size:24px}.jc40-loader-card p{color:#a5a8c7;line-height:1.55}
  </style>
</head>
<body>
  <div class="jc40-loader">
    <div class="jc40-loader-card">
      <b>JustClover Stage 52</b>
      <p>Загружаю стабильную версию: вход без автопетель и активный просмотр после входа…</p>
    </div>
  </div>

  <script>
    (async function(){
      const BASE_COMMIT = "f658b5bfad3fade4eb7f9c4d82865452cdc19f00";
      const BASE_VERSION = "stage37-catalog-hard-scroll-fix-20260502-1";
      const BUILD = "stage66-native-player-shell-20260502-1";
      const BASE_INDEX = "https://cdn.jsdelivr.net/gh/BCXOVER/JustClover@" + BASE_COMMIT + "/index.html";

      try {

        try {
          const u = new URL(location.href);
          let changed = false;
          ['guest','autoGuest','asGuest'].forEach(k => { if (u.searchParams.has(k)) { u.searchParams.delete(k); changed = true; } });
          if (changed) history.replaceState({}, '', u.pathname + u.search + u.hash);
          ['jc58ActiveViewMode','jc57ActiveViewMode','jc56ActiveViewMode','jc55ActiveViewMode','jc54ActiveViewMode','jc53ActiveViewMode','jc52ActiveViewMode','jc51ActiveViewMode','jc50ActiveViewMode'].forEach(k => localStorage.removeItem(k));
        } catch (_) {}

        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister())).catch(() => {});
        }
        if ("caches" in window) {
          caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(() => {});
        }

        const res = await fetch(BASE_INDEX + "?jc45=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("Не удалось загрузить базовый index: " + res.status);
        let html = await res.text();
        html = html.replaceAll(BASE_VERSION, BUILD);
        html = html.replace(/37 HARD/g, "66 NATIVE");
        html = html.replace(/Stage 37 HARD/g, "Stage 50 ACTIVE");

        document.open();
        document.write(html);
        document.close();
      } catch (e) {
        console.error("JustClover Stage 52 boot failed", e);
        document.body.innerHTML = '<div class="jc40-loader"><div class="jc40-loader-card"><b>Stage 52 не загрузился</b><p>' + String(e.message || e) + '</p><p>Проверь интернет/CDN или загрузи предыдущий архив.</p></div></div>';
      }
    })();
  </script>
</body>
</html>
