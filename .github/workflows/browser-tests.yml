name: Browser smoke tests

on:
  workflow_dispatch:
    inputs:
      expected_build:
        description: Expected window.JUSTCLOVER_BUILD
        required: true
        default: stage118-gif-gallery-no-api-stable-20260503-1
      room_id:
        description: Optional room id for URL
        required: false
        default: ''
  push:
    branches:
      - main

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BASE_URL: https://bcxover.github.io/JustClover/
      EXPECTED_BUILD: ${{ github.event.inputs.expected_build || 'stage118-gif-gallery-no-api-stable-20260503-1' }}
      ROOM_ID: ${{ github.event.inputs.room_id || '' }}
      DEPLOY_WAIT_MS: '300000'
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
